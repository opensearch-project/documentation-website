extends: capitalization
message: "'%s' is a heading and should be in sentence case."
level: error
scope: heading
match: $sentence
indicators:
  - ":"
  - "."
  - ")"
exceptions:
  - k    # ignores lowercase k-NN
  - '[A-Z]{2,}' # ignores all acronyms
  - '([A-Z][a-z0-9]+){2,}' # ignores all camel case words
  - '(\w+\s+)+APIs?'
  - 'gRPC' # ignores gRPC acronym
  - 'Arabic'
  - 'Armenian'
  - 'Basque'
  - 'Bengali'
  - 'Brazilian'
  - 'Bulgarian'
  - 'Catalan'
  - 'Czech'
  - 'Danish'
  - 'Dutch'
  - 'English'
  - 'Estonian'
  - 'Finnish'
  - 'French'
  - 'Galician'
  - 'German'
  - 'Greek'
  - 'Hindi'
  - 'Hungarian'
  - 'Indonesian'
  - 'Irish'
  - 'Italian'
  - 'Latvian'
  - 'Lithuanian'
  - 'Norwegian'
  - 'Persian'
  - 'Polish'
  - 'Portuguese'
  - 'Romanian'
  - 'Russian'
  - 'Spanish'
  - 'Swedish'
  - 'Thai'
  - 'Turkish'
  - 'Ukrainian'
  - 'Hunspell'
  - 'Latin'
